<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABH Action Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#333;min-height:100vh;position:relative}

/* Transparent ABH watermark */
body::before{
  content:'';
  position:fixed;
  top:50%;left:50%;
  width:500px;height:500px;
  transform:translate(-50%,-50%);
  background:url('abh-logo.png') no-repeat center center;
  background-size:contain;
  opacity:0.06;
  pointer-events:none;
  z-index:0;
}

.header{
  background:linear-gradient(135deg,#1B2A4A 0%,#243a64 100%);
  color:#fff;
  padding:0 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:fixed;top:0;left:0;right:0;
  z-index:100;
  height:60px;
  box-shadow:0 2px 12px rgba(27,42,74,0.3);
}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{height:36px;width:auto;border-radius:4px}
.header h1{font-size:18px;font-weight:bold;letter-spacing:0.3px}
.header .subtitle{font-size:11px;color:#8899bb;margin-top:2px}
.header-right{display:flex;align-items:center;gap:16px}
.person-select{
  padding:8px 14px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);
  color:#fff;
  font-family:Arial;
  font-size:13px;
  cursor:pointer;
  backdrop-filter:blur(4px);
}
.person-select:focus{outline:2px solid #0E7CCE;outline-offset:2px}
.person-select option{background:#1B2A4A;color:#fff}

.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:bold;color:#fff;letter-spacing:0.3px}
.badge-open{background:#E67E22}
.badge-done{background:#27AE60}
.badge-blocked{background:#C0392B}
.badge-overdue{background:#C0392B;animation:pulse 2s infinite}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.7}
}

.container{max-width:1000px;margin:80px auto 80px;padding:20px;position:relative;z-index:1}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
.stat-card{
  background:#fff;
  border-radius:10px;
  padding:20px 16px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  border-top:3px solid #1B2A4A;
  transition:transform 0.15s,box-shadow 0.15s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.stat-card .num{font-size:32px;font-weight:bold}
.stat-card .label{font-size:10px;color:#888;text-transform:uppercase;margin-top:6px;letter-spacing:0.5px}
.stat-open{border-top-color:#E67E22}
.stat-open .num{color:#E67E22}
.stat-done{border-top-color:#27AE60}
.stat-done .num{color:#27AE60}
.stat-blocked{border-top-color:#C0392B}
.stat-blocked .num{color:#C0392B}
.stat-overdue{border-top-color:#C0392B}
.stat-overdue .num{color:#C0392B}
.stat-total .num{color:#1B2A4A}

.action-list{display:flex;flex-direction:column;gap:12px}

.action-card{
  background:#fff;
  border-radius:10px;
  padding:18px 22px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  border-left:5px solid #E67E22;
  transition:all .2s;
  position:relative;
}
.action-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateX(2px)}
.action-card.done{border-left-color:#27AE60;opacity:.65}
.action-card.done:hover{opacity:.85}
.action-card.blocked{border-left-color:#C0392B}
.action-card.overdue{border-left-color:#C0392B;background:#fff8f6}

.action-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.action-num{
  font-size:12px;
  font-weight:bold;
  color:#fff;
  background:#1B2A4A;
  border-radius:50%;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  margin-top:2px;
}
.action-ref{font-size:11px;color:#0E7CCE;font-weight:bold;margin-bottom:4px;letter-spacing:0.3px}
.action-desc{font-size:14px;line-height:1.5;color:#333}
.action-meta{font-size:11px;color:#999;margin-top:6px;display:flex;gap:16px;flex-wrap:wrap}
.action-meta span{display:inline-flex;align-items:center;gap:4px}

.action-controls{
  display:flex;
  gap:10px;
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid #f0f0f0;
  flex-wrap:wrap;
  align-items:center;
}
.action-controls label{font-size:10px;color:#888;font-weight:bold;text-transform:uppercase;letter-spacing:0.4px}
.control-group{display:flex;flex-direction:column;gap:4px}
.action-controls select,.action-controls input{
  font-family:Arial;font-size:13px;
  padding:6px 10px;
  border:1px solid #ddd;
  border-radius:6px;
  background:#fafafa;
  transition:border-color 0.2s;
}
.action-controls select:focus,.action-controls input:focus{border-color:#0E7CCE;outline:none;background:#fff}
.action-controls select{min-width:110px}
.action-controls input[type=date]{width:145px}

.comment-row{margin-top:10px;display:flex;gap:8px;align-items:center}
.comment-row input{
  flex:1;font-family:Arial;font-size:13px;
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:6px;
  background:#fafafa;
  transition:border-color 0.2s;
}
.comment-row input:focus{border-color:#0E7CCE;outline:none;background:#fff}
.comment-row input::placeholder{color:#bbb}

.btn{padding:8px 18px;border:none;border-radius:6px;font-family:Arial;font-size:13px;font-weight:bold;cursor:pointer;transition:all .2s;letter-spacing:0.3px}
.btn-save{background:#27AE60;color:#fff;box-shadow:0 2px 6px rgba(39,174,96,0.3)}
.btn-save:hover{background:#219a52;box-shadow:0 4px 12px rgba(39,174,96,0.4)}
.btn-save:disabled{background:#ccc;box-shadow:none;cursor:default}

.save-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(135deg,#1B2A4A 0%,#243a64 100%);
  color:#fff;
  padding:12px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
  box-shadow:0 -2px 12px rgba(27,42,74,0.2);
}
.save-bar .sync-status{font-size:12px;letter-spacing:0.3px}
.save-bar .sync-ok{color:#27AE60}
.save-bar .sync-dirty{color:#E67E22}
.save-bar .sync-err{color:#C0392B}

.empty-state{text-align:center;padding:80px 20px;color:#888}
.empty-state h2{font-size:20px;margin-bottom:10px;color:#1B2A4A}
.empty-state p{font-size:14px;line-height:1.6}

.rob-view{margin-top:8px}
.rob-section{margin-bottom:28px}
.rob-section-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 16px;
  background:linear-gradient(135deg,#1B2A4A 0%,#2a3f6a 100%);
  border-radius:8px;
  margin-bottom:14px;
}
.rob-section-header h2{font-size:14px;font-weight:bold;color:#fff;flex:1}
.rob-section-header .badge{font-size:10px}

.person-group h3{font-size:13px;color:#1B2A4A;margin:12px 0 8px;padding:6px 12px;background:#eef1f5;border-radius:6px}

.loading-spinner{
  display:flex;align-items:center;justify-content:center;
  padding:80px 20px;
  color:#888;font-size:14px;
}
.loading-spinner::before{
  content:'';
  width:24px;height:24px;
  border:3px solid #ddd;
  border-top-color:#0E7CCE;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-right:12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .container{padding:12px}
}
@media(max-width:500px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .action-controls{flex-direction:column;align-items:stretch}
  .control-group{flex-direction:row;align-items:center;gap:8px}
  .header h1{font-size:15px}
  .header .subtitle{display:none}
  .header-logo{height:28px}
  body::before{width:300px;height:300px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <img src="abh-logo.png" alt="ABH" class="header-logo">
    <div>
      <h1>Action Tracker</h1>
      <div class="subtitle">Part of the Mann &amp; Noble Group</div>
    </div>
  </div>
  <div class="header-right">
    <select class="person-select" id="personFilter" onchange="filterPerson()">
      <option value="__ALL__">All Staff (Rob View)</option>
    </select>
  </div>
</div>

<div class="container" id="app">
  <div class="stats" id="statsBar"></div>
  <div class="action-list" id="actionList">
    <div class="loading-spinner">Loading actions...</div>
  </div>
</div>

<div class="save-bar">
  <span class="sync-status" id="syncStatus">Loading...</span>
  <button class="btn btn-save" id="saveBtn" onclick="saveAll()" disabled>Save Changes</button>
</div>

<script>
const SB_URL='https://gdfbpvzatnqmzujagtqm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkZmJwdnphdG5xbXp1amFndHFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzE3NTQsImV4cCI6MjA5MDIwNzc1NH0.O0XquoCFEaIL0xJZKGaPrFgfz42A_j1uKRUjhr6Zqvw';
const sb=supabase.createClient(SB_URL,SB_KEY);

let actions=[];
let dirty=new Set();
let currentPerson='__ALL__';

const urlParams=new URLSearchParams(window.location.search);
const paramPerson=urlParams.get('person');

async function loadAll(){
  try{
    const{data,error}=await sb.from('action_tracker').select('*').order('person').order('sort_order');
    if(error)throw error;
    actions=data||[];
    buildPersonFilter();
    if(paramPerson){
      currentPerson=paramPerson;
      document.getElementById('personFilter').value=paramPerson;
    }
    render();
    setSync('ok','All changes saved');
  }catch(e){
    console.error(e);
    setSync('err','Failed to load: '+e.message);
    document.getElementById('actionList').innerHTML='<div class="empty-state"><h2>Connection error</h2><p>'+e.message+'</p></div>';
  }
}

function buildPersonFilter(){
  const sel=document.getElementById('personFilter');
  const people=[...new Set(actions.map(a=>a.person))].sort();
  sel.innerHTML='<option value="__ALL__">All Staff (Rob View)</option>';
  people.forEach(p=>{
    const opt=document.createElement('option');
    opt.value=p;opt.textContent=p;
    sel.appendChild(opt);
  });
}

function filterPerson(){
  currentPerson=document.getElementById('personFilter').value;
  const url=new URL(window.location);
  if(currentPerson==='__ALL__')url.searchParams.delete('person');
  else url.searchParams.set('person',currentPerson);
  window.history.replaceState({},'',url);
  render();
}

function render(){
  const filtered=currentPerson==='__ALL__'?actions:actions.filter(a=>a.person===currentPerson);
  renderStats(filtered);
  if(currentPerson==='__ALL__')renderRobView(filtered);
  else renderPersonView(filtered);
}

function renderStats(list){
  const open=list.filter(a=>a.status==='open').length;
  const done=list.filter(a=>a.status==='done').length;
  const blocked=list.filter(a=>a.status==='blocked').length;
  const overdue=list.filter(a=>a.status==='open'&&a.target_date&&new Date(a.target_date)<new Date()).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card stat-total"><div class="num">${list.length}</div><div class="label">Total</div></div>
    <div class="stat-card stat-open"><div class="num">${open}</div><div class="label">Open</div></div>
    <div class="stat-card stat-done"><div class="num">${done}</div><div class="label">Done</div></div>
    <div class="stat-card stat-blocked"><div class="num">${blocked}</div><div class="label">Blocked</div></div>
    <div class="stat-card stat-overdue"><div class="num">${overdue}</div><div class="label">Overdue</div></div>`;
}

function isOverdue(a){return a.status==='open'&&a.target_date&&new Date(a.target_date)<new Date()}

function renderPersonView(list){
  const el=document.getElementById('actionList');
  if(!list.length){el.innerHTML='<div class="empty-state"><h2>No actions</h2><p>Nothing assigned to this person.</p></div>';return;}
  el.innerHTML=list.map(a=>actionCard(a)).join('');
}

function renderRobView(list){
  const el=document.getElementById('actionList');
  if(!list.length){el.innerHTML='<div class="empty-state"><h2>No actions loaded</h2><p>Check that the Supabase action_tracker table has data.</p></div>';return;}
  const byPerson={};
  list.forEach(a=>{if(!byPerson[a.person])byPerson[a.person]=[];byPerson[a.person].push(a);});
  let html='<div class="rob-view">';
  Object.keys(byPerson).sort().forEach(p=>{
    const items=byPerson[p];
    const open=items.filter(x=>x.status==='open').length;
    const overdue=items.filter(x=>isOverdue(x)).length;
    html+=`<div class="rob-section">
      <div class="rob-section-header">
        <h2>${p}</h2>
        <span class="badge badge-open">${open} open</span>
        ${overdue?'<span class="badge badge-overdue">'+overdue+' overdue</span>':''}
      </div>`;
    html+=items.map(a=>actionCard(a)).join('');
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function actionCard(a){
  const od=isOverdue(a);
  const cls=a.status+(od?' overdue':'');
  const targetVal=a.target_date||'';
  const statusOpts=['open','done','blocked'].map(s=>`<option value="${s}"${a.status===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('');
  const refCode=a.action_ref||('ACT-'+a.sort_order);
  return `<div class="action-card ${cls}" id="card-${a.id}">
    <div class="action-top">
      <span class="action-num">${a.sort_order}</span>
      <div style="flex:1">
        <div class="action-ref">${refCode}</div>
        <div class="action-desc">${a.description}</div>
        <div class="action-meta">
          <span>Source: ${a.source_meeting||'\u2014'}</span>
          <span>Raised: ${fmtDate(a.date_raised)}</span>
          ${a.target_date?'<span>Due: '+fmtDate(a.target_date)+'</span>':''}
        </div>
      </div>
      <span class="badge badge-${od?'overdue':a.status}">${od?'OVERDUE':a.status.toUpperCase()}</span>
    </div>
    <div class="action-controls">
      <div class="control-group">
        <label>Status</label>
        <select onchange="updateField('${a.id}','status',this.value)">${statusOpts}</select>
      </div>
      <div class="control-group">
        <label>Target Date</label>
        <input type="date" value="${targetVal}" onchange="updateField('${a.id}','target_date',this.value)">
      </div>
    </div>
    <div class="comment-row">
      <input type="text" placeholder="Add a comment or update..." value="${a.comment||''}" onchange="updateField('${a.id}','comment',this.value)">
    </div>
  </div>`;
}

function fmtDate(d){if(!d)return '\u2014';const dt=new Date(d);return dt.toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'})}

function updateField(id,field,val){
  const a=actions.find(x=>x.id===id);
  if(!a)return;
  a[field]=val||null;
  if(field==='status'&&val==='done')a.completed_date=new Date().toISOString().slice(0,10);
  if(field==='status'&&val!=='done')a.completed_date=null;
  a.updated_at=new Date().toISOString();
  dirty.add(id);
  document.getElementById('saveBtn').disabled=false;
  setSync('dirty',dirty.size+' unsaved change'+(dirty.size>1?'s':''));
  const card=document.getElementById('card-'+id);
  if(card){const tmp=document.createElement('div');tmp.innerHTML=actionCard(a);card.replaceWith(tmp.firstElementChild);}
  renderStats(currentPerson==='__ALL__'?actions:actions.filter(x=>x.person===currentPerson));
}

async function saveAll(){
  if(!dirty.size)return;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    const updates=actions.filter(a=>dirty.has(a.id)).map(a=>({
      id:a.id,status:a.status,comment:a.comment,target_date:a.target_date,
      completed_date:a.completed_date,updated_at:a.updated_at
    }));
    for(const u of updates){
      const{error}=await sb.from('action_tracker').update(u).eq('id',u.id);
      if(error)throw error;
    }
    dirty.clear();
    setSync('ok','All changes saved');
    btn.textContent='Save Changes';
  }catch(e){
    console.error(e);
    setSync('err','Save failed: '+e.message);
    btn.disabled=false;btn.textContent='Save Changes';
  }
}

function setSync(type,msg){
  const el=document.getElementById('syncStatus');
  el.className='sync-status sync-'+type;
  el.textContent=msg;
}

loadAll();
</script>
</body>
</html>
